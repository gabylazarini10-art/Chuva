<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Chuva — Agro Lazarini</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2D6A4F">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Chuva">
<style>
:root{
  --verde:#2D6A4F;--verde-cl:#40916C;--verde-bg:#D8F3DC;--verde-tx:#1B4332;
  --azul:#1D6FA5;--azul-cl:#2E8FD4;--azul-bg:#DCEEFB;--azul-tx:#0B3C5D;
  --ouro:#E9C46A;--tx:#1C1C1C;--tx2:#5C5C5C;--tx3:#9C9C9C;
  --bg:#F5F4F0;--sf:#fff;--bd:#E0DED8;--r:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}

.header{background:var(--verde);padding:12px 20px 10px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50}
.header-logo{height:40px;width:40px;background:#fff;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.header-text{flex:1}
.header-text h1{font-size:15px;font-weight:700;color:#fff;letter-spacing:.03em}
.header-text p{font-size:11px;color:rgba(255,255,255,.7);margin-top:1px}
#sync-status{font-size:10px;color:rgba(255,255,255,.85)}

.main-tabs{display:flex;background:var(--sf);border-bottom:2px solid var(--bd);position:sticky;top:64px;z-index:40}
.main-tab{flex:1;padding:11px 4px;font-size:12px;font-weight:600;background:none;border:none;cursor:pointer;color:var(--tx3);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:5px}
.main-tab.active{color:var(--verde);border-bottom-color:var(--verde)}
.main-tab span{font-size:15px}

.tab-content{display:none}
.tab-content.active{display:block}

.steps{display:flex;justify-content:center;gap:0;padding:14px 20px;background:var(--sf);border-bottom:1px solid var(--bd)}
.step{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--tx3)}
.step.active{color:var(--verde);font-weight:600}
.step.done{color:var(--verde-cl)}
.step-num{width:20px;height:20px;border-radius:50%;background:var(--bd);color:var(--tx3);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.step.active .step-num{background:var(--verde);color:#fff}
.step.done .step-num{background:var(--verde-cl);color:#fff}
.step-line{width:20px;height:1px;background:var(--bd);margin:0 4px}

.page{display:none;padding:20px;max-width:480px;margin:0 auto;animation:fadeIn .2s}
.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

.card{background:var(--sf);border-radius:var(--r);border:1px solid var(--bd);padding:18px;margin-bottom:14px}
.field-label{font-size:12px;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;display:block}
.field-label .req{color:#e74c3c;margin-left:2px}

.options{display:flex;flex-direction:column;gap:8px}
.opt{display:flex;align-items:center;gap:10px;padding:11px 14px;border:1.5px solid var(--bd);border-radius:8px;cursor:pointer;transition:all .15s;background:var(--sf)}
.opt:hover{border-color:var(--verde-cl);background:var(--verde-bg)}
.opt.selected{border-color:var(--verde);background:var(--verde-bg)}
.opt input[type=radio]{display:none}
.opt-circle{width:18px;height:18px;border-radius:50%;border:2px solid var(--bd);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.opt.selected .opt-circle{border-color:var(--verde);background:var(--verde)}
.opt.selected .opt-circle::after{content:'';width:7px;height:7px;border-radius:50%;background:#fff}
.opt-label{font-size:13px;font-weight:500}

.inp{width:100%;padding:12px 14px;font-size:14px;border:1.5px solid var(--bd);border-radius:8px;background:var(--sf);color:var(--tx);outline:none;font-family:inherit;transition:border .15s}
.inp:focus{border-color:var(--verde)}
.inp-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mm-input-wrap{display:flex;align-items:baseline;gap:8px}
.mm-input-wrap input{width:120px;font-size:30px;font-weight:700;border:none;border-bottom:2px solid var(--azul);padding:4px 0;color:var(--tx);background:transparent}
.mm-input-wrap input:focus{outline:none;border-color:var(--verde)}
.mm-unit{font-size:14px;color:var(--tx2);font-weight:600}

.btn-wrap{display:flex;gap:10px;margin-top:6px}
.btn{flex:1;padding:14px;font-size:14px;font-weight:600;border:none;border-radius:10px;cursor:pointer;transition:all .15s;font-family:inherit}
.btn-back{background:var(--sf);border:1.5px solid var(--bd);color:var(--tx2)}
.btn-back:hover{background:var(--bg)}
.btn-next{background:var(--verde);color:#fff}
.btn-next:hover{background:var(--verde-cl)}
.btn-next:disabled{background:var(--bd);color:var(--tx3);cursor:not-allowed}
.btn-submit{background:var(--ouro);color:#1a1a00;font-size:15px}
.btn-submit:hover{background:#d4a830}

.resumo-item{display:flex;justify-content:space-between;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--bd);gap:10px}
.resumo-item:last-child{border-bottom:none}
.resumo-label{font-size:11px;color:var(--tx3);text-transform:uppercase;letter-spacing:.04em;flex-shrink:0}
.resumo-val{font-size:13px;font-weight:600;color:var(--tx);text-align:right}

.success{text-align:center;padding:30px 20px}
.success-icon{font-size:56px;margin-bottom:14px}
.success h2{font-size:20px;font-weight:700;color:var(--verde);margin-bottom:6px}
.success p{font-size:13px;color:var(--tx2);margin-bottom:20px;line-height:1.6}
.btn-novo{background:var(--verde);color:#fff;border:none;padding:14px 28px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}

.hist-wrapper{max-width:480px;margin:0 auto;padding:16px 16px 80px}
.hist-toolbar{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:12px;margin-bottom:12px}
.search-inp{width:100%;padding:9px 12px;font-size:12px;border:1.5px solid var(--bd);border-radius:8px;background:var(--sf);color:var(--tx);outline:none;font-family:inherit;margin-bottom:8px}
.search-inp:focus{border-color:var(--verde)}
.filter-row{display:flex;gap:6px;flex-wrap:wrap}
.filter-select{flex:1;min-width:100px;padding:7px 10px;font-size:11px;border:1px solid var(--bd);border-radius:7px;background:var(--sf);color:var(--tx);font-family:inherit}
.hist-count{font-size:11px;color:var(--tx3);margin:6px 0 10px}

.hist-item{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:13px;margin-bottom:8px;position:relative}
.hist-top{font-weight:700;font-size:16px;margin-bottom:4px;color:var(--azul)}
.hist-det{color:var(--tx2);line-height:1.7;font-size:12px}
.hist-actions{display:flex;gap:6px;margin-top:8px}
.btn-edit{font-size:11px;font-weight:600;background:var(--verde-bg);color:var(--verde-tx);border:1px solid var(--verde-cl);border-radius:6px;padding:5px 10px;cursor:pointer;font-family:inherit}
.btn-edit:hover{background:var(--verde);color:#fff}
.btn-del{font-size:11px;font-weight:600;background:#FFF0F0;color:#c0392b;border:1px solid #FFCCCC;border-radius:6px;padding:5px 10px;cursor:pointer;font-family:inherit}
.btn-del:hover{background:#c0392b;color:#fff}

.fab{position:fixed;bottom:24px;right:20px;background:var(--ouro);color:#1a1a00;border:none;width:56px;height:56px;border-radius:50%;font-size:28px;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.25);z-index:100;display:flex;align-items:center;justify-content:center;font-weight:700;transition:transform .15s}
.fab:hover{transform:scale(1.07)}

.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:flex-end;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--sf);border-radius:16px 16px 0 0;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;padding:20px}
.modal h3{font-size:15px;font-weight:700;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--tx3);padding:0}
.modal-field{margin-bottom:12px}
.modal-field label{display:block;font-size:11px;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.btn-save{width:100%;padding:14px;font-size:14px;font-weight:700;background:var(--verde);color:#fff;border:none;border-radius:10px;cursor:pointer;font-family:inherit;margin-top:8px}
.btn-save:hover{background:var(--verde-cl)}

.painel-wrapper{max-width:480px;margin:0 auto;padding:16px}
.painel-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.stat-card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:14px}
.stat-card .lbl{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.stat-card .val{font-size:20px;font-weight:700;color:var(--tx)}
.stat-card .val.azul{color:var(--azul)}
.filter-row-painel{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}

.export-section{background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:14px;margin-bottom:12px}
.export-section-title{font-size:11px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px}
.btn-export-full{width:100%;padding:13px;font-size:14px;font-weight:700;background:var(--verde);color:#fff;border:none;border-radius:10px;cursor:pointer;font-family:inherit;margin-top:4px;transition:background .15s}
.btn-export-full:hover{background:var(--verde-cl)}
.btn-export-full.ouro{background:var(--ouro);color:#1a1a00}
.btn-export-full.ouro:hover{background:#d4a830}

.sub-tab-bar{display:flex;gap:0;border-bottom:2px solid var(--bd);margin-bottom:14px}
.sub-tab-btn{flex:1;padding:9px 4px;font-size:12px;font-weight:600;background:none;border:none;cursor:pointer;color:var(--tx3);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;font-family:inherit}
.sub-tab-btn.active{color:var(--verde);border-bottom-color:var(--verde)}

.chart-wrap{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:14px;margin-bottom:12px}
.chart-wrap canvas{width:100%;max-height:220px}

.cfg-add-row{display:flex;gap:8px;margin-bottom:12px}
.cfg-list-item{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border:1px solid var(--bd);border-radius:8px;margin-bottom:6px;background:var(--sf)}
.cfg-list-item span{font-size:13px;font-weight:500}
.cfg-list-item button{background:none;border:none;color:#c0392b;font-size:16px;cursor:pointer}
.cfg-group{margin-bottom:20px}
.cfg-group h4{font-size:12px;font-weight:700;color:var(--tx2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px}

@media print {
  body * { visibility: hidden; }
  #print-area, #print-area * { visibility: visible; }
  #print-area { position: absolute; top: 0; left: 0; width: 100%; padding: 20px; font-size: 13pt; }
  .painel-stats { display: grid !important; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  .card { page-break-inside: avoid; border: 1px solid #ccc !important; padding: 14px !important; margin-bottom: 16px !important; border-radius: 8px !important; }
  canvas { max-width: 100% !important; }
  .print-header { display: block !important; }
}
.print-header { display: none; }
</style>
</head>

<script>
// ══════════ DADOS ══════════
const LISTAS_PADRAO = {
  fazendas: ['São José 1','São José 2','Minuano'],
  safras: ['25/26','26/27','27/28'],
};
const LISTAS_VERSAO = 'v1-2026';
let LISTAS = JSON.parse(localStorage.getItem('chuva_listas')||'null') || JSON.parse(JSON.stringify(LISTAS_PADRAO));
if(localStorage.getItem('chuva_listas_versao')!==LISTAS_VERSAO){
  LISTAS = JSON.parse(JSON.stringify(LISTAS_PADRAO));
  localStorage.setItem('chuva_listas_versao', LISTAS_VERSAO);
  localStorage.setItem('chuva_listas', JSON.stringify(LISTAS));
}

function renderFiltrosFazenda(){
  const opts = LISTAS.fazendas.map(f=>`<option>${f}</option>`).join('');
  ['hist-fil-fazenda','painel-fazenda'].forEach(id=>{
    const el = document.getElementById(id);
    const atual = el.value;
    el.innerHTML = '<option value="">Todas as fazendas</option>'+opts;
    if([...el.options].some(o=>o.value===atual)) el.value = atual;
  });
  const safraSel = document.getElementById('painel-safra');
  const atualS = safraSel.value;
  safraSel.innerHTML = '<option value="">Todas as safras</option>'+LISTAS.safras.map(s=>`<option>${s}</option>`).join('');
  if([...safraSel.options].some(o=>o.value===atualS)) safraSel.value = atualS;
}
function iniciarHistoricoMain(){
  renderFiltrosFazenda();
  const meses = new Set();
  JSON.parse(localStorage.getItem('chuva_hist')||'[]').forEach(r=> meses.add((r.data||'').slice(0,7)));
  const mesSel = document.getElementById('hist-fil-mes');
  const atual = mesSel.value;
  mesSel.innerHTML = '<option value="">Todos os meses</option>' + [...meses].sort().reverse().map(m=>`<option value="${m}">${m}</option>`).join('');
  if([...mesSel.options].some(o=>o.value===atual)) mesSel.value = atual;
  renderHistorico();
}
function renderHistorico(){
  const hist = JSON.parse(localStorage.getItem('chuva_hist')||'[]').sort((a,b)=> (b.data||'').localeCompare(a.data||'') || b.ts-a.ts);
  const busca = (document.getElementById('hist-search').value||'').toLowerCase();
  const filFaz = document.getElementById('hist-fil-fazenda').value;
  const filMes = document.getElementById('hist-fil-mes').value;
  const filtrado = hist.filter(r=>{
    if(filFaz && r.fazenda!==filFaz) return false;
    if(filMes && !(r.data||'').startsWith(filMes)) return false;
    if(busca && !((r.ponto||'').toLowerCase().includes(busca) || (r.obs||'').toLowerCase().includes(busca))) return false;
    return true;
  });
  document.getElementById('hist-count').textContent = `${filtrado.length} registro(s)`;
  document.getElementById('hist-list').innerHTML = filtrado.map(r=>`
    <div class="hist-item">
      <div class="hist-top">${r.mm} mm</div>
      <div class="hist-det">
        📅 ${formatarData(r.data)}<br>
        🏡 ${r.fazenda} — ${r.ponto}
        ${r.obs?`<br>📝 ${r.obs}`:''}
      </div>
      <div class="hist-actions">
        <button class="btn-edit" onclick="abrirEdicao('${r.id}')">Editar</button>
        <button class="btn-del" onclick="excluirRegistro('${r.id}')">Excluir</button>
      </div>
    </div>
  `).join('') || '<p style="font-size:12px;color:var(--tx3);text-align:center;padding:30px 0">Nenhum registro encontrado.</p>';
}
function excluirRegistro(id){
  if(!confirm('Excluir este registro de chuva?')) return;
  let hist = JSON.parse(localStorage.getItem('chuva_hist')||'[]');
  hist = hist.filter(r=>r.id!==id);
  localStorage.setItem('chuva_hist', JSON.stringify(hist));
  if(typeof window.excluirNoFirebase==='function') window.excluirNoFirebase(id);
  renderHistorico();
}
function abrirEdicao(id){
  const hist = JSON.parse(localStorage.getItem('chuva_hist')||'[]');
  const r = hist.find(x=>x.id===id);
  if(!r) return;
  document.getElementById('edit-id').value = r.id;
  document.getElementById('edit-data').value = r.data;
  document.getElementById('edit-fazenda').value = r.fazenda;
  atualizarPontosEdicao();
  document.getElementById('edit-ponto').value = r.ponto;
  document.getElementById('edit-mm').value = r.mm;
  document.getElementById('edit-obs').value = r.obs||'';
  document.getElementById('modal-edit').classList.add('open');
}
function atualizarPontosEdicao(){
  const faz = document.getElementById('edit-fazenda').value;
  const lista = PONTOS[faz]||[];
  document.getElementById('edit-ponto').innerHTML = lista.map(p=>`<option>${p}</option>`).join('');
}
function fecharEdicao(){ document.getElementById('modal-edit').classList.remove('open'); }
function salvarEdicao(){
  const id = document.getElementById('edit-id').value;
  let hist = JSON.parse(localStorage.getItem('chuva_hist')||'[]');
  const idx = hist.findIndex(r=>r.id===id);
  if(idx<0) return;
  hist[idx] = {
    ...hist[idx],
    data: document.getElementById('edit-data').value,
    fazenda: document.getElementById('edit-fazenda').value,
    ponto: document.getElementById('edit-ponto').value,
    mm: parseFloat(document.getElementById('edit-mm').value)||0,
    obs: document.getElementById('edit-obs').value,
  };
  localStorage.setItem('chuva_hist', JSON.stringify(hist));
  if(typeof window.enviarParaFirebase==='function') window.enviarParaFirebase(hist[idx]);
  fecharEdicao();
  renderHistorico();
}

// ══════════ ANÁLISE ══════════
function iniciarPainelMain(){
  renderFiltrosFazenda();
  const hist = JSON.parse(localStorage.getItem('chuva_hist')||'[]');
  const filFaz = document.getElementById('painel-fazenda').value;
  const filSafra = document.getElementById('painel-safra').value;
  let filtrado = hist.filter(r=> !filFaz || r.fazenda===filFaz);
  if(filSafra){
    const [a1,a2] = filSafra.split('/').map(s=>2000+parseInt(s));
    filtrado = filtrado.filter(r=>{
      const d = new Date(r.data);
      const ano = d.getFullYear(), mes = d.getMonth()+1;
      if(mes>=7) return ano===a1; else return ano===a2;
    });
  }
  const hoje = new Date().toISOString().slice(0,10);
  const mesAtual = new Date().toISOString().slice(0,7);
  const mmHoje = filtrado.filter(r=>r.data===hoje).reduce((s,r)=>s+r.mm,0);
  const mmMes = filtrado.filter(r=>(r.data||'').startsWith(mesAtual)).reduce((s,r)=>s+r.mm,0);
  const mmAcum = filtrado.reduce((s,r)=>s+r.mm,0);
  const dias = new Set(filtrado.map(r=>r.data)).size;
  const media = dias ? (mmAcum/dias).toFixed(1) : '0.0';

  document.getElementById('painel-stats').innerHTML = `
    <div class="stat-card"><div class="lbl">Chuva hoje</div><div class="val azul">${mmHoje.toFixed(1)} mm</div></div>
    <div class="stat-card"><div class="lbl">Chuva no mês</div><div class="val azul">${mmMes.toFixed(1)} mm</div></div>
    <div class="stat-card"><div class="lbl">Acumulado safra</div><div class="val">${mmAcum.toFixed(1)} mm</div></div>
    <div class="stat-card"><div class="lbl">Média por dia c/ chuva</div><div class="val">${media} mm</div></div>
  `;

  desenharGraficoMensal(filtrado);
  desenharComparativoPontos(filtrado);
  window._filtradoAtual = filtrado;
}
function desenharGraficoMensal(dados){
  const porMes = {};
  dados.forEach(r=>{
    const m = (r.data||'').slice(0,7);
    if(!m) return;
    porMes[m] = (porMes[m]||0) + r.mm;
  });
  const meses = Object.keys(porMes).sort();
  const canvas = document.getElementById('chart-mensal');
  const ctx = canvas.getContext('2d');
  const w = canvas.width = canvas.clientWidth;
  const h = canvas.height = 220;
  ctx.clearRect(0,0,w,h);
  if(!meses.length){
    ctx.fillStyle = '#9C9C9C'; ctx.font='12px sans-serif'; ctx.fillText('Sem dados para exibir', 10, 30);
    return;
  }
  const max = Math.max(...meses.map(m=>porMes[m]), 1);
  const padL=36, padB=26, padT=10;
  const barW = (w-padL-10) / meses.length * 0.6;
  const gap = (w-padL-10) / meses.length;
  ctx.strokeStyle = '#E0DED8'; ctx.beginPath(); ctx.moveTo(padL,padT); ctx.lineTo(padL,h-padB); ctx.lineTo(w-5,h-padB); ctx.stroke();
  ctx.fillStyle = '#5C5C5C'; ctx.font='9px sans-serif'; ctx.textAlign='center';
  meses.forEach((m,i)=>{
    const val = porMes[m];
    const barH = (h-padT-padB) * (val/max);
    const x = padL + i*gap + (gap-barW)/2;
    const y = h - padB - barH;
    ctx.fillStyle = '#2E8FD4';
    ctx.fillRect(x, y, barW, barH);
    ctx.fillStyle = '#1C1C1C'; ctx.font='9px sans-serif';
    ctx.fillText(val.toFixed(0), x+barW/2, y-4);
    ctx.fillStyle = '#5C5C5C';
    ctx.fillText(m.slice(5)+'/'+m.slice(2,4), x+barW/2, h-padB+12);
  });
}
function desenharComparativoPontos(dados){
  const porPonto = {};
  dados.forEach(r=>{
    const k = r.fazenda+' — '+r.ponto;
    porPonto[k] = (porPonto[k]||0) + r.mm;
  });
  const entries = Object.entries(porPonto).sort((a,b)=>b[1]-a[1]);
  const max = Math.max(...entries.map(e=>e[1]), 1);
  document.getElementById('comparativo-pontos').innerHTML = `
    <div class="export-section-title" style="margin-bottom:12px">Comparativo entre pontos de coleta</div>
    ${entries.map(([k,v])=>`
      <div style="margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px">
          <span>${k}</span><span style="font-weight:700">${v.toFixed(1)} mm</span>
        </div>
        <div style="background:var(--bg);border-radius:6px;height:8px;overflow:hidden">
          <div style="background:var(--verde);height:100%;width:${(v/max*100)}%"></div>
        </div>
      </div>
    `).join('') || '<p style="font-size:12px;color:var(--tx3)">Sem dados.</p>'}
  `;
}
function exportarCSV(){
  const dados = window._filtradoAtual || [];
  let csv = 'Data;Fazenda;Ponto;mm;Observação\n';
  dados.forEach(r=> csv += `${formatarData(r.data)};${r.fazenda};${r.ponto};${r.mm};${r.obs||''}\n`);
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'chuva_agro_lazarini.csv'; a.click();
  URL.revokeObjectURL(url);
}

function iniciarConfig(){
  garantirPontosFazendas();
  cfgRenderFazendas();
  const sel = document.getElementById('cfg-fazenda-sel');
  sel.innerHTML = LISTAS.fazendas.map(f=>`<option>${f}</option>`).join('');
  cfgRenderPontos();
}
function cfgRenderFazendas(){
  document.getElementById('cfg-lista-fazendas').innerHTML = LISTAS.fazendas.map(f=>`
    <div class="cfg-list-item"><span>${f}</span><button onclick="cfgRemoverFazenda('${f}')">✕</button></div>
  `).join('');
}
function cfgAdicionarFazenda(){
  const v = document.getElementById('cfg-nova-fazenda').value.trim();
  if(!v) return;
  if(LISTAS.fazendas.includes(v)){ alert('Essa fazenda já existe.'); return; }
  LISTAS.fazendas.push(v);
  PONTOS[v] = [];
  salvarListas(); salvarPontos();
  document.getElementById('cfg-nova-fazenda').value='';
  iniciarConfig(); renderOpcoesFazenda(); renderFiltrosFazenda();
}
function cfgRemoverFazenda(f){
  if(!confirm(`Remover a fazenda "${f}"? Os registros já salvos não serão apagados.`)) return;
  LISTAS.fazendas = LISTAS.fazendas.filter(x=>x!==f);
  delete PONTOS[f];
  salvarListas(); salvarPontos();
  iniciarConfig(); renderOpcoesFazenda(); renderFiltrosFazenda();
}
function cfgRenderPontos(){
  const faz = document.getElementById('cfg-fazenda-sel').value;
  const lista = PONTOS[faz]||[];
  document.getElementById('cfg-lista-pontos').innerHTML = lista.map(p=>`
    <div class="cfg-list-item"><span>${p}</span><button onclick="cfgRemoverPonto('${faz}','${p}')">✕</button></div>
  `).join('') || '<p style="font-size:12px;color:var(--tx3)">Nenhum ponto cadastrado.</p>';
}
function cfgAdicionarPonto(){
  const faz = document.getElementById('cfg-fazenda-sel').value;
  const v = document.getElementById('cfg-novo-ponto').value.trim();
  if(!v || !faz) return;
  if(!PONTOS[faz]) PONTOS[faz]=[];
  if(PONTOS[faz].includes(v)){ alert('Esse ponto já existe nessa fazenda.'); return; }
  PONTOS[faz].push(v);
  salvarPontos();
  document.getElementById('cfg-novo-ponto').value='';
  cfgRenderPontos();
  if(form.fazenda===faz) renderOpcoesPonto();
}
function cfgRemoverPonto(faz, p){
  if(!confirm(`Remover o ponto "${p}"?`)) return;
  PONTOS[faz] = (PONTOS[faz]||[]).filter(x=>x!==p);
  salvarPontos();
  cfgRenderPontos();
  if(form.fazenda===faz) renderOpcoesPonto();
}

}
window.atualizarStatusSync = atualizarStatusSync;

function adicionarPendente(reg){
  const p = JSON.parse(localStorage.getItem('chuva_pendentes')||'[]');
  if(!p.find(x=>x.id===reg.id)) p.push(reg);
  localStorage.setItem('chuva_pendentes', JSON.stringify(p));
}

window.enviarParaFirebase = async function(reg){
  if(!window.SYNC.ativo){ adicionarPendente(reg); atualizarStatusSync(); return; }
  try{ await set(ref(window.SYNC.db,'chuva/registros/'+reg.id), reg); }
  catch(e){ adicionarPendente(reg); }
  atualizarStatusSync();
};
window.excluirNoFirebase = async function(id){
  if(!window.SYNC.ativo) return;
  try{ await remove(ref(window.SYNC.db,'chuva/registros/'+id)); } catch(e){}
};

window.sincronizarPendentes = async function(){
  if(!window.SYNC.ativo) return;
  let p = JSON.parse(localStorage.getItem('chuva_pendentes')||'[]');
  const restantes=[];
  for(const reg of p){
    try{ await set(ref(window.SYNC.db,'chuva/registros/'+reg.id), reg); }
    catch(e){ restantes.push(reg); }
  }
  localStorage.setItem('chuva_pendentes', JSON.stringify(restantes));
  atualizarStatusSync();
};

window.salvarConfigRemoto = async function(chave, valor){
  if(!window.SYNC.ativo) return;
  try{ await set(ref(window.SYNC.db,'chuva/config/'+chave), JSON.stringify(valor)); }
  catch(e){ console.warn('Erro ao salvar config remoto:', e); }
};

function escutarConfigRemoto(){
  onValue(ref(window.SYNC.db,'chuva/config'), snap=>{
    const remoto = snap.val();
    if(!remoto) return;
    try{
      if(remoto.listas){ localStorage.setItem('chuva_listas', remoto.listas); }
      if(remoto.pontos){ localStorage.setItem('chuva_pontos', remoto.pontos); }
      if(typeof window.onSyncUpdate==='function') window.onSyncUpdate();
    }catch(e){}
  });
}
function escutarRegistrosRemotos(){
  onValue(ref(window.SYNC.db,'chuva/registros'), snap=>{
    const remoto = snap.val() || {};
    const hist = Object.values(remoto);
    localStorage.setItem('chuva_hist', JSON.stringify(hist));
    if(typeof window.onSyncUpdate==='function') window.onSyncUpdate();
  });
}

async function initSync(){
  try{
    const app = initializeApp(FIREBASE_CONFIG);
    window.SYNC.db = getDatabase(app);
    window.SYNC.ativo = true;
    escutarConfigRemoto();
    escutarRegistrosRemotos();
    atualizarStatusSync();
    window.sincronizarPendentes();
  }catch(e){
    console.warn('Firebase indisponível:', e);
  }
}
window.addEventListener('online', ()=>{ atualizarStatusSync(); window.sincronizarPendentes(); });
window.addEventListener('offline', atualizarStatusSync);
setInterval(atualizarStatusSync, 8000);
initSync();
</script>
